name: Update Antigravity

on:
  schedule:
    # Run every day at 17:00 UTC (5:00 PM) to catch typical afternoon releases
    - cron: '0 17 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-antigravity:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check for updates
        id: check
        run: |
          set -euo pipefail

          echo "=== Checking current versions ==="
          CURRENT_CLI=$(jq -r '.cli.version' version.json)
          CURRENT_HUB=$(jq -r '.hub.version' version.json)
          CURRENT_IDE=$(jq -r '.ide.version' version.json)
          CURRENT_SDK=$(jq -r '.sdk.version' version.json)

          echo "Current CLI: $CURRENT_CLI"
          echo "Current Hub: $CURRENT_HUB"
          echo "Current IDE: $CURRENT_IDE"
          echo "Current SDK: $CURRENT_SDK"

          echo "=== Fetching latest versions ==="
          
          # Fetch latest CLI version from Google Storage XML
          LATEST_CLI=$(curl -s "https://storage.googleapis.com/antigravity-public/?prefix=antigravity-cli/" | tr '>' '\n' | grep -oP "^antigravity-cli/[0-9]+\.[0-9]+\.[0-9]+-[0-9]+/" | cut -d/ -f2 | sort -V | tail -n 1)
          if [ -z "$LATEST_CLI" ]; then
            echo "Error: Failed to fetch latest CLI version."
            exit 1
          fi
          echo "Latest CLI found: $LATEST_CLI"

          # Fetch latest Hub version from Google Storage XML
          LATEST_HUB=$(curl -s "https://storage.googleapis.com/antigravity-public/?prefix=antigravity-hub/" | tr '>' '\n' | grep -oP "^antigravity-hub/[0-9]+\.[0-9]+\.[0-9]+-[0-9]+/" | cut -d/ -f2 | grep -v "^100\." | sort -V | tail -n 1)
          if [ -z "$LATEST_HUB" ]; then
            echo "Error: Failed to fetch latest Hub version."
            exit 1
          fi
          echo "Latest Hub found: $LATEST_HUB"

          # Fetch latest IDE version from Google Antigravity landing page bundle
          LATEST_MAIN_JS=$(curl -s --compressed "https://antigravity.google/" | grep -oP 'main-[A-Z0-9]+\.js' | head -n 1)
          if [ -z "$LATEST_MAIN_JS" ]; then
            echo "Error: Failed to fetch main bundle name from landing page."
            exit 1
          fi
          LATEST_IDE=$(curl -s --compressed "https://antigravity.google/$LATEST_MAIN_JS" | grep -oP 'https://edgedl\.me\.gvt1\.com/edgedl/release2/j0qc3/antigravity/stable/[0-9]+\.[0-9]+\.[0-9]+-[0-9]+/linux-x64/Antigravity%20IDE\.tar\.gz' | head -n 1 | cut -d/ -f9)
          if [ -z "$LATEST_IDE" ]; then
            echo "Error: Failed to fetch latest IDE version."
            exit 1
          fi
          echo "Latest IDE found: $LATEST_IDE"

          # Fetch latest SDK version from PyPI API
          LATEST_SDK=$(curl -s "https://pypi.org/pypi/google-antigravity/json" | jq -r '.info.version')
          if [ -z "$LATEST_SDK" ] || [ "$LATEST_SDK" = "null" ]; then
            echo "Error: Failed to fetch latest SDK version from PyPI."
            exit 1
          fi
          echo "Latest SDK found: $LATEST_SDK"

          UPDATE_NEEDED="false"
          UPDATE_CLI=""
          UPDATE_HUB=""
          UPDATE_IDE=""
          UPDATE_SDK=""

          if [ "$LATEST_CLI" != "$CURRENT_CLI" ] && [ "$(printf '%s\n' "$CURRENT_CLI" "$LATEST_CLI" | sort -V | tail -n 1)" = "$LATEST_CLI" ]; then
            echo "New CLI version available: $LATEST_CLI"
            UPDATE_NEEDED="true"
            UPDATE_CLI="$LATEST_CLI"
          fi

          if [ "$LATEST_HUB" != "$CURRENT_HUB" ] && [ "$(printf '%s\n' "$CURRENT_HUB" "$LATEST_HUB" | sort -V | tail -n 1)" = "$LATEST_HUB" ]; then
            echo "New Hub version available: $LATEST_HUB"
            UPDATE_NEEDED="true"
            UPDATE_HUB="$LATEST_HUB"
          fi

          if [ "$LATEST_IDE" != "$CURRENT_IDE" ] && [ "$(printf '%s\n' "$CURRENT_IDE" "$LATEST_IDE" | sort -V | tail -n 1)" = "$LATEST_IDE" ]; then
            echo "New IDE version available: $LATEST_IDE"
            UPDATE_NEEDED="true"
            UPDATE_IDE="$LATEST_IDE"
          fi

          if [ "$LATEST_SDK" != "$CURRENT_SDK" ] && [ "$(printf '%s\n' "$CURRENT_SDK" "$LATEST_SDK" | sort -V | tail -n 1)" = "$LATEST_SDK" ]; then
            echo "New SDK version available: $LATEST_SDK"
            UPDATE_NEEDED="true"
            UPDATE_SDK="$LATEST_SDK"
          fi

          echo "update_needed=$UPDATE_NEEDED" >> $GITHUB_OUTPUT
          echo "update_cli=$UPDATE_CLI" >> $GITHUB_OUTPUT
          echo "update_hub=$UPDATE_HUB" >> $GITHUB_OUTPUT
          echo "update_ide=$UPDATE_IDE" >> $GITHUB_OUTPUT
          echo "update_sdk=$UPDATE_SDK" >> $GITHUB_OUTPUT

      - name: Update Flake
        if: steps.check.outputs.update_needed == 'true'
        run: |
          chmod +x ./update-version.sh
          ARGS=""
          [[ -n "${{ steps.check.outputs.update_cli }}" ]] && ARGS="$ARGS --cli ${{ steps.check.outputs.update_cli }}"
          [[ -n "${{ steps.check.outputs.update_hub }}" ]] && ARGS="$ARGS --hub ${{ steps.check.outputs.update_hub }}"
          [[ -n "${{ steps.check.outputs.update_ide }}" ]] && ARGS="$ARGS --ide ${{ steps.check.outputs.update_ide }}"
          [[ -n "${{ steps.check.outputs.update_sdk }}" ]] && ARGS="$ARGS --sdk ${{ steps.check.outputs.update_sdk }}"
          ./update-version.sh $ARGS

      - name: Update flake.lock
        if: steps.check.outputs.update_needed == 'true'
        run: nix flake update

      - name: Verify Flake
        if: steps.check.outputs.update_needed == 'true'
        run: |
          nix flake check --no-build
          nix build .#antigravity-cli .#antigravity .#antigravity-ide .#antigravity-sdk --no-link

      - name: Commit and Push
        if: steps.check.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json flake.lock

          # Collect updated components
          UPDATES=""
          [[ -n "${{ steps.check.outputs.update_cli }}" ]] && UPDATES="$UPDATES CLI→${{ steps.check.outputs.update_cli }}"
          [[ -n "${{ steps.check.outputs.update_hub }}" ]] && UPDATES="$UPDATES Hub→${{ steps.check.outputs.update_hub }}"
          [[ -n "${{ steps.check.outputs.update_ide }}" ]] && UPDATES="$UPDATES IDE→${{ steps.check.outputs.update_ide }}"
          [[ -n "${{ steps.check.outputs.update_sdk }}" ]] && UPDATES="$UPDATES SDK→${{ steps.check.outputs.update_sdk }}"

          # Remove leading space
          UPDATES="${UPDATES# }"

          if [[ "$UPDATES" == *" "* ]]; then
            # Multiple components: "chore: update CLI→1.0.3, Hub→2.0.7"
            MSG="chore: update ${UPDATES}"
          else
            # Single component: "chore(cli): update to 1.0.3"
            SCOPE="${UPDATES%%→*}"
            VERSION="${UPDATES##*→}"
            MSG="chore(${SCOPE,,}): update to ${VERSION}"
          fi

          echo "Commit message: $MSG"
          git commit -m "$MSG" || echo "Nothing to commit"
          git push
